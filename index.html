<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kindle Clock</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 0px;
            padding-top: 10px;
            background-color: white;
            color: black;
            overflow: hidden; /* 防止出现滚动条 */
            height: 100vh;    /* 占满全屏 */
            display: flex;    /* 使用弹性布局，方便上下排列 */
            flex-direction: column;
            align-items: center;
        }
        #time {
            font-size: 5.5em; 
            font-weight: bold;
            line-height: 1.0;
            margin-bottom: 5px; /* 稍微减小间距 */
        }
        #date {
            font-size: 1.8em;
            color: #444;
            margin-bottom: 20px; /* 日期和图片之间的距离 */
        }
        
        /* 【新增】图片的样式 */
        #hero-img {
            /* 方案 A：直接写像素（推荐） */
            /* 从 200px 改成 450px，应该能占满大半个屏幕 */
            width: 450px; 
            
            /* 方案 B：按屏幕比例（如果怕太大溢出） */
            /* width: 70%; */

            height: auto;
            
            /* 保持之前的滤镜和圆角 */
            filter: grayscale(100%) contrast(120%); 
            border-radius: 10px; 
            
            /* 【新增】如果图片太大，为了防止它贴着日期太近，加点上边距 */
            margin-top: 20px;
        }

    </style>
</head>
<body>
    <div id="time">--:--</div>
    <div id="date">...</div>

    <!-- 【新增】图片位置 -->
    <!-- 
         注意：如果您用【中策】，请确保图片文件名为 sunce.png 并且和 html 在一起 
         如果您用【上策】，请把 src="" 里面的内容换成 Base64 长字符串
    -->
    <img id="hero-img" src="sunce.png" alt="孙策大葱图">

    <script type="text/javascript">
        function updateTime() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            if (hours < 10) { hours = "0" + hours; }
            if (minutes < 10) { minutes = "0" + minutes; }
            var timeStr = hours + ":" + minutes;
            
            var year = now.getFullYear();
            var month = now.getMonth() + 1;
            var day = now.getDate();
            var dateStr = year + "/" + month + "/" + day;
            
            document.getElementById("time").innerHTML = timeStr;
            document.getElementById("date").innerHTML = dateStr;
        }
        
        updateTime();
        setInterval(updateTime, 1000);

        // 60秒强制刷新逻辑保持不变
        setTimeout(function() {
            var timestamp = new Date().getTime();
            var currentUrl = window.location.href.split('?')[0];
            window.location.href = currentUrl + "?t=" + timestamp;
        }, 60000);
    </script>
</body>
</html>
